name: Test (reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      # Explicit lockstep gate so producer/collector wire-contract drift
      # surfaces as a named failed step in PR CI logs (the test is also
      # covered by `go test ./...` above, but the explicit name is the
      # signal a reviewer notices).
      - name: Validate event schema lockstep
        run: go test ./pkg/telemetry/... -run TestGolden_ValidatesAgainstSchema -v
