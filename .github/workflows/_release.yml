name: Release (reusable)

# Runs semantic-release against the calling ref. Outputs whether a new
# version was cut so downstream jobs can decide whether to publish.

on:
  workflow_call:
    outputs:
      released:
        description: "true if semantic-release cut a new version"
        value: ${{ jobs.release.outputs.released }}
      version:
        description: "The released version tag (e.g. v1.2.3); empty when released=false"
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # semantic-release walks history from the last release tag, so
          # it needs the full graph. persist-credentials: false lets the
          # GitHub plugin use GITHUB_TOKEN explicitly instead of the
          # checkout one (matches skills-platform's ci.yml).
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Release
        id: semrel
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx semantic-release
          # Capture whether a release was cut by inspecting tags on HEAD.
          # semantic-release creates the tag locally before publishing it
          # via the GitHub API, so an exact-match describe works here.
          if TAG=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            {
              echo "released=true"
              echo "version=${TAG}"
            } >> "$GITHUB_OUTPUT"
            echo "Released ${TAG}"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No release cut for this main push (no semver-bumping commits)."
          fi
