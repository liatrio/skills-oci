name: PR Title

# Validates the PR title against Conventional Commits. Squash-merge is
# the convention here, so the PR title becomes the commit on main and
# feeds semantic-release.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  conventional:
    name: conventional commit
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
