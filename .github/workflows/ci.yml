name: CI

# Orchestrator that wires together the reusable test, semantic-release,
# build-push, and release-binaries workflows. Each stage lives in its
# own file under .github/workflows/_*.yml; this file owns the triggers,
# concurrency, and the conditions that decide which stages run.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

# Cancel redundant PR builds; never cancel in-flight main / tag publishes.
concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  release:
    needs: test
    # semantic-release runs only on direct pushes to main. Tag pushes
    # (manual / backport) and PRs skip this job; build-and-push handles
    # those paths directly.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_semantic-release.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
    secrets: inherit

  build-and-push:
    needs: [test, release]
    # Publish on:
    #   - tag pushes (manual / backport release path)
    #   - main pushes where semantic-release cut a new version
    #   - manual workflow_dispatch (produces a dev image)
    # PRs only run `test`.
    if: |
      always() && needs.test.result == 'success' && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (needs.release.outputs.released == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    uses: ./.github/workflows/_build-push.yml
    with:
      release-version: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    secrets: inherit

  release-binaries:
    needs: [test, release]
    # Publish binaries on the same conditions that publish the image,
    # minus workflow_dispatch (dev images are not releases):
    #   - tag pushes (manual / backport)
    #   - main pushes where semantic-release cut a new version
    if: |
      always() && needs.test.result == 'success' && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        needs.release.outputs.released == 'true'
      )
    uses: ./.github/workflows/_release-binaries.yml
    permissions:
      contents: write
    secrets: inherit
