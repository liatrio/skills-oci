name: GoReleaser (reusable)

# Runs GoReleaser to build cross-platform archives, attach them to the
# GitHub Release (in append mode — semantic-release already created the
# release + notes), and publish the Homebrew formula to
# liatrio/homebrew-taproom. Assumes the caller has already run tests;
# ci.yml owns the trigger surface and gates this call on a passing
# test job.

on:
  workflow_call:
    inputs:
      version:
        description: >-
          Tag to release on (e.g. v1.2.3). Required when called from a
          non-tag-push context (e.g. semantic-release on main); otherwise
          falls back to github.ref_name.
        required: false
        type: string
        default: ""

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Exchange OIDC for tap installation token
        id: sts-tap
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: liatrio/homebrew-taproom
          identity: skills-oci-release

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Pin the tag explicitly so this works on both tag-push and
          # semantic-release-on-main paths without re-checkout.
          GORELEASER_CURRENT_TAG: ${{ env.VERSION }}
          # Append assets to the release semantic-release just created.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Short-lived installation token scoped to the tap repo, minted
          # via the octo-sts trust policy at
          # liatrio/homebrew-taproom/.github/chainguard/skills-oci-release.sts.yaml.
          HOMEBREW_TAP_TOKEN: ${{ steps.sts-tap.outputs.token }}
          # Telemetry defaults baked into the binary via -ldflags. Empty
          # fallbacks keep stock builds effectively off until the
          # collector is stood up. See _goreleaser.yaml.
          TELEMETRY_ENDPOINT: ${{ vars.TELEMETRY_ENDPOINT }}
          TELEMETRY_TOKEN: ${{ vars.TELEMETRY_TOKEN }}

      - name: Enable auto-merge on tap PR
        env:
          GH_TOKEN: ${{ steps.sts-tap.outputs.token }}
        run: |
          pr_number=$(gh pr list \
            --repo liatrio/homebrew-taproom \
            --head "skills-oci-${VERSION}" \
            --json number --jq '.[0].number')
          if [ -z "$pr_number" ]; then
            echo "No PR found for skills-oci-${VERSION}" >&2
            exit 1
          fi
          gh pr merge "$pr_number" \
            --repo liatrio/homebrew-taproom \
            --auto --squash
