name: Image

# Adapted from https://github.com/jburns24/skills-oci with Liatrio CI
# conventions applied: SHA-pinned actions, PR test trigger, Go module
# caching, concurrency group, strict bash, env-passed step inputs.
# Adds automated semver tagging via semantic-release (driven by
# Conventional Commits on main) for parity with skills-platform.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

# Cancel redundant PR builds; never cancel in-flight main / tag publishes.
concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/skills-oci

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  release:
    needs: test
    # semantic-release runs only on direct pushes to main. Tag pushes
    # (manual / backport) and PRs skip this job; build-and-push handles
    # those paths directly.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # semantic-release walks history from the last release tag, so
          # it needs the full graph. persist-credentials: false lets the
          # GitHub plugin use GITHUB_TOKEN explicitly instead of the
          # checkout one (matches skills-platform's ci.yml).
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Release
        id: semrel
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          npx semantic-release
          # Capture whether a release was cut by inspecting tags on HEAD.
          # semantic-release creates the tag locally before publishing it
          # via the GitHub API, so an exact-match describe works here.
          if TAG=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            {
              echo "released=true"
              echo "version=${TAG}"
            } >> "$GITHUB_OUTPUT"
            echo "Released ${TAG}"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No release cut for this main push (no semver-bumping commits)."
          fi

  build-and-push:
    needs: [test, release]
    # Publish on:
    #   - tag pushes (manual / backport release path)
    #   - main pushes where semantic-release cut a new version
    #   - manual workflow_dispatch (produces a dev image)
    # PRs only run `test`.
    if: |
      always() && needs.test.result == 'success' && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (needs.release.outputs.released == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      ref: ${{ steps.publish.outputs.ref }}
    env:
      KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/skills-oci
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up ko
        uses: ko-build/setup-ko@d982fec422852203cfb2053a8ec6ad302280d04d # v0.8
        with:
          version: v0.18.0

      - name: Compute version and tags
        id: meta
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push: use the pushed tag verbatim.
            VERSION="${GITHUB_REF_NAME}"
            TAGS="${VERSION},latest"
          elif [[ -n "${RELEASE_TAG}" ]]; then
            # Main push after semantic-release: use the new tag.
            VERSION="${RELEASE_TAG}"
            TAGS="${VERSION},latest"
          else
            # workflow_dispatch on a non-tagged ref: dev image scoped to
            # the dispatching branch so manual runs from a feature branch
            # don't clobber main's latest-* tag. Slashes aren't legal in
            # OCI tags, so flatten them.
            SAFE_REF="${GITHUB_REF_NAME//\//-}"
            VERSION="${SAFE_REF}-${GITHUB_SHA::7}"
            TAGS="${VERSION},latest-${SAFE_REF}"
          fi
          {
            echo "version=${VERSION}"
            echo "tags=${TAGS}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push with ko
        id: publish
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          REF=$(ko build . \
            --bare \
            --tags="${TAGS}" \
            --platform=linux/amd64,linux/arm64)
          DIGEST="${REF##*@}"
          {
            echo "ref=${REF}"
            echo "digest=${DIGEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Summary
        shell: bash
        env:
          REF: ${{ steps.publish.outputs.ref }}
          DIGEST: ${{ steps.publish.outputs.digest }}
          IMAGE: ${{ env.IMAGE }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          {
            echo "### Published image"
            echo "- \`${REF}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo "- Verify: \`gh attestation verify oci://${IMAGE}@${DIGEST} --owner ${OWNER}\`"
          } >> "$GITHUB_STEP_SUMMARY"
