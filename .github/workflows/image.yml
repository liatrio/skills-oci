name: Image

# Adapted from https://github.com/jburns24/skills-oci with Liatrio CI
# conventions applied: SHA-pinned actions, PR test trigger, Go module
# caching, concurrency group, strict bash, env-passed step inputs.

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

# Cancel redundant PR builds; never cancel in-flight main / tag publishes.
concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/skills-oci

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  build-and-push:
    needs: test
    # Skip publish on PRs - test job above still runs to catch breakage.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.publish.outputs.digest }}
      ref: ${{ steps.publish.outputs.ref }}
    env:
      KO_DOCKER_REPO: ghcr.io/${{ github.repository_owner }}/skills-oci
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up ko
        uses: ko-build/setup-ko@d982fec422852203cfb2053a8ec6ad302280d04d # v0.8
        with:
          version: v0.18.0

      - name: Compute version and tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            TAGS="${VERSION},latest"
          else
            VERSION="main-${GITHUB_SHA::7}"
            TAGS="${VERSION},latest-main"
          fi
          {
            echo "version=${VERSION}"
            echo "tags=${TAGS}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push with ko
        id: publish
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          REF=$(ko build . \
            --bare \
            --tags="${TAGS}" \
            --platform=linux/amd64,linux/arm64)
          DIGEST="${REF##*@}"
          {
            echo "ref=${REF}"
            echo "digest=${DIGEST}"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Summary
        shell: bash
        env:
          REF: ${{ steps.publish.outputs.ref }}
          DIGEST: ${{ steps.publish.outputs.digest }}
          IMAGE: ${{ env.IMAGE }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          {
            echo "### Published image"
            echo "- \`${REF}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo "- Verify: \`gh attestation verify oci://${IMAGE}@${DIGEST} --owner ${OWNER}\`"
          } >> "$GITHUB_STEP_SUMMARY"
