name: Release Binaries (reusable)

# Builds cross-platform Go binaries and attaches them to a GitHub
# Release for the calling ref. Assumes the caller has already run tests;
# ci.yml owns the trigger surface and gates this call on a passing
# test job.

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build binaries
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=linux  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-linux-amd64       .
          GOOS=linux  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-linux-arm64       .
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-darwin-amd64      .
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-darwin-arm64      .
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-windows-amd64.exe .

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/skills-oci-linux-amd64
            dist/skills-oci-linux-arm64
            dist/skills-oci-darwin-amd64
            dist/skills-oci-darwin-arm64
            dist/skills-oci-windows-amd64.exe
            dist/checksums.txt
