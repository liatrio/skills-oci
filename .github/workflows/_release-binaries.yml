name: Release Binaries (reusable)

# Builds cross-platform Go binaries and attaches them to a GitHub
# Release for the calling ref. Assumes the caller has already run tests;
# ci.yml owns the trigger surface and gates this call on a passing
# test job.

on:
  workflow_call:
    inputs:
      version:
        description: >-
          Tag to embed in binaries and release on (e.g. v1.2.3). Required
          when called from a non-tag-push context (e.g. semantic-release
          on main); otherwise falls back to github.ref_name.
        required: false
        type: string
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build binaries
        shell: bash
        # Telemetry defaults are injected via -ldflags from repo/org
        # variables — not secrets — because the endpoint is a public
        # URL and the token is a shared anti-abuse value (see
        # docs/telemetry-data-contract.md "Auth model"). Empty fallbacks
        # keep stock builds effectively off (the transport treats an
        # empty endpoint as no-op) until the collector is stood up.
        env:
          TELEMETRY_ENDPOINT: ${{ vars.TELEMETRY_ENDPOINT }}
          TELEMETRY_TOKEN: ${{ vars.TELEMETRY_TOKEN }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X main.version=${VERSION} \
            -X github.com/salaboy/skills-oci/pkg/telemetry.DefaultEndpoint=${TELEMETRY_ENDPOINT:-} \
            -X github.com/salaboy/skills-oci/pkg/telemetry.DefaultToken=${TELEMETRY_TOKEN:-}"
          mkdir -p dist

          GOOS=linux  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-linux-amd64       .
          GOOS=linux  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-linux-arm64       .
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-darwin-amd64      .
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-darwin-arm64      .
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-windows-amd64.exe .

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          # When called from the semantic-release path, github.ref_name
          # is "main"; force the release onto the new version tag.
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            dist/skills-oci-linux-amd64
            dist/skills-oci-linux-arm64
            dist/skills-oci-darwin-amd64
            dist/skills-oci-darwin-arm64
            dist/skills-oci-windows-amd64.exe
            dist/checksums.txt
