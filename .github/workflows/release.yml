name: Release

# Cuts a GitHub Release with cross-platform binaries for every v* tag.
# Runs alongside image.yml on tag pushes: image.yml publishes the OCI
# image, release.yml publishes the binary artifacts users install
# locally (curl, go install, or a future Homebrew tap).

on:
  push:
    tags:
      - 'v*'
  # Also callable from image.yml when semantic-release cuts a new tag on
  # main. Tags pushed by GITHUB_TOKEN don't fire the push trigger above,
  # so the workflow_call path is what auto-releases binaries after a
  # semantic-release merge.
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/_test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build binaries
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=linux  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-linux-amd64       .
          GOOS=linux  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-linux-arm64       .
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-darwin-amd64      .
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-darwin-arm64      .
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/skills-oci-windows-amd64.exe .

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/skills-oci-linux-amd64
            dist/skills-oci-linux-arm64
            dist/skills-oci-darwin-amd64
            dist/skills-oci-darwin-arm64
            dist/skills-oci-windows-amd64.exe
            dist/checksums.txt
