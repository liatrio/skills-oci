name: Brew audit (reusable)

# Renders the Homebrew formula GoReleaser would publish to
# liatrio/homebrew-taproom and runs FormulaAudit RuboCop + strict-new
# audit against it — the same checks that gate the tap's PR. Catches
# FormulaAudit/Desc, FormulaAudit/License, etc. *before* we push a
# broken formula to the tap.
#
# Patterns borrowed from liatrio/homebrew-taproom/.github/workflows/tests.yml:
#   - ubuntu + macOS matrix (some audit rules only fire on macOS)
#   - bundler gems cache keyed on setup-homebrew's gems-hash

on:
  workflow_call:

jobs:
  brew-audit:
    strategy:
      # Don't abort the macOS job when Linux fails (or vice versa) — we
      # want both signals on the PR.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      # Render the formula without touching the registry, GitHub Release,
      # or the tap repo. Snapshot mode lets goreleaser run without a tag.
      - name: Render Homebrew formula via GoReleaser snapshot
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish,sign,sbom,announce
        env:
          # Stub values so the ldflags template resolves; nothing leaves
          # the runner.
          TELEMETRY_ENDPOINT: ""
          TELEMETRY_TOKEN: ""
          HOMEBREW_TAP_TOKEN: ""

      - name: Locate generated formula
        id: formula
        run: |
          set -euo pipefail
          path=$(find dist -type f -name 'skills-oci.rb' | head -n1)
          if [ -z "$path" ]; then
            echo "No skills-oci.rb generated under dist/" >&2
            find dist -maxdepth 3 -type f >&2 || true
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Rendered formula: $path"
          cat "$path"

      - name: Set up Homebrew
        id: set-up-homebrew
        # SHA-pinned snapshot of Homebrew/actions main (per the
        # liatrio/homebrew-taproom tests.yml convention). @master is
        # deprecated; @main is a moving target — pinning a SHA keeps
        # this workflow reproducible. Bump alongside the tap when it
        # bumps.
        uses: Homebrew/actions/setup-homebrew@6eaeff80e7e5c43087c0e5eb5aa82120399e9c91 # Homebrew/actions main @ 2026-05-27

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      # `brew test-bot` and the audits underneath it resolve any arg
      # containing a `/` as a tap-qualified name (`user/repo[/formula]`)
      # before treating it as a file path — so passing the rendered
      # `dist/homebrew/Formula/skills-oci.rb` gets mis-parsed as the tap
      # `dist/homebrew`. Stage the formula inside a real local tap so
      # the audit runs in the same shape as production
      # (liatrio/homebrew-taproom).
      - name: Stage formula in local tap
        run: |
          set -euo pipefail
          tap_dir="$(brew --repository)/Library/Taps/local/homebrew-audit"
          mkdir -p "$tap_dir/Formula"
          cp "${{ steps.formula.outputs.path }}" "$tap_dir/Formula/skills-oci.rb"

      # `brew test-bot --only-tap-syntax` was the original choice for
      # parity with the tap's tests.yml, but on macOS setup-homebrew
      # pre-installs homebrew/core, and test-bot (without --tap) audits
      # whichever tap it finds via git diff — defaulting to homebrew/core
      # when our local tap has no git history. That had it failing on
      # unrelated openssl@1.1 style nits in homebrew/core, not on our
      # formula. Run the same checks (FormulaAudit RuboCop + strict-new
      # audit) directly against the tap-qualified name, which is
      # unambiguously scoped to our formula.
      - name: brew style (FormulaAudit RuboCop checks)
        run: brew style local/audit/skills-oci

      # `--new` is intentionally omitted: it includes a network
      # reachability check on the archive URL, which 404s for a
      # snapshot formula whose URL references a real tag but with a
      # `-next`-suffixed filename that doesn't exist. The tap's own
      # `brew test-bot --only-tap-syntax` doesn't do that check either,
      # so dropping `--new` here keeps us closer to what the tap runs.
      - name: brew audit --strict
        run: brew audit --strict local/audit/skills-oci
