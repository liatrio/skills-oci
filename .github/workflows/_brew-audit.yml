name: Brew audit (reusable)

# Renders the Homebrew formula GoReleaser would publish to
# liatrio/homebrew-taproom and runs the same audit/style checks the tap's
# `brew test-bot --only-tap-syntax` job runs on the resulting PR. This
# catches FormulaAudit/Desc, FormulaAudit/License, etc. *before* we push
# a broken formula to the tap.

on:
  workflow_call:

jobs:
  brew-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      # Render the formula without touching the registry, GitHub Release,
      # or the tap repo. Snapshot mode lets goreleaser run without a tag.
      - name: Render Homebrew formula via GoReleaser snapshot
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6.4.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish,sign,sbom,announce
        env:
          # Stub values so the ldflags template resolves; nothing leaves
          # the runner.
          TELEMETRY_ENDPOINT: ""
          TELEMETRY_TOKEN: ""
          HOMEBREW_TAP_TOKEN: ""

      - name: Locate generated formula
        id: formula
        run: |
          path=$(find dist -type f -name 'skills-oci.rb' | head -n1)
          if [ -z "$path" ]; then
            echo "No skills-oci.rb generated under dist/" >&2
            find dist -maxdepth 3 -type f >&2 || true
            exit 1
          fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Rendered formula: $path"
          cat "$path"

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # `brew style` mirrors `brew test-bot --only-tap-syntax` — same
      # RuboCop ruleset (FormulaAudit/*) that flagged the trailing period
      # in description on the first release. `--strict` matches what the
      # tap CI runs.
      - name: brew style (FormulaAudit RuboCop checks)
        run: brew style --formula "${{ steps.formula.outputs.path }}"

      # `brew audit --strict --new` runs the audits that apply to
      # never-before-published formulae — strictly a superset of what
      # the tap CI does today, so anything green here will stay green
      # in the tap.
      - name: brew audit --strict --new
        run: brew audit --strict --new --formula "${{ steps.formula.outputs.path }}"
